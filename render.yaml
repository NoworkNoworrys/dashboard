services:
  - type: web
    name: geo-dashboard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: EXTRA_CORS_ORIGINS
        value: ""   # add extra origins here if needed, comma-separated
